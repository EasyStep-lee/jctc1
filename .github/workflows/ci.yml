name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: local_root_password
          MYSQL_DATABASE: jctc_local
          MYSQL_USER: jctc
          MYSQL_PASSWORD: local_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -plocal_root_password"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7.4
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: pnpm/action-setup@v6.0.9
        with:
          version: 10.12.1
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 25.8.1
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm prisma:validate
      - run: pnpm db:check
      - run: pnpm openapi:check
      - run: pnpm build
